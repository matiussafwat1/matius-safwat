<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>اتصل بنا</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <header>
        <h1>تواصل معنا</h1>
    </header>

    <nav>
        <a href="index.html">Home</a>
        <a href="add-course.html">add course</a>
        <a href="courses.html">My courses</a>
    </nav>

    <main>
        <form>
            <div class="form-group">
                <label>اكتب شكوتك أو رسالتك:</label>
                <textarea rows="5" placeholder="نحن نستمع إليك..." required></textarea>
            </div>

            <div class="form-group">
                <label>ما رأيك في جودة الموقع؟</label>
                <div class="rating-options">
                    <label><input type="radio" name="rating" value="excellent"> ممتاز</label>
                    <label><input type="radio" name="rating" value="very-good"> جيد جداً</label>
                    <label><input type="radio" name="rating" value="good"> جيد</label>
                    <label><input type="radio" name="rating" value="acceptable"> مقبول</label>
                    <label><input type="radio" name="rating" value="bad"> سيئ</label>
                </div>
            </div>

            <button type="submit">إرسال</button>
        </form>

        <div class="social-links">
            <a href="https://facebook.com" target="_blank"><i class="fab fa-facebook"></i> Facebook</a>
            <a href="https://instagram.com" target="_blank"><i class="fab fa-instagram"></i> Instagram</a>
            <a href="https://linkedin.com" target="_blank"><i class="fab fa-linkedin"></i> LinkedIn</a>
        </div>
    </main>

    <footer>
        <p>&copy; IT Task 2026</p>
    </footer>
</body>
</html>
